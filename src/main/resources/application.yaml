spring:
  application:
    name: server
  flyway:
    enabled: false
  jpa:
    properties:
      hibernate:
        default_batch_fetch_size: 100

server:
  port: 8080

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

external:
  kakao:
    local:
      base-url: ${KAKAO_LOCAL_BASE_URL:https://dapi.kakao.com}
      rest-api-key: ${KAKAO_REST_API_KEY:}
      connect-timeout: 3s
      read-timeout: 5s
  tour-api:
    base-url: ${TOUR_API_BASE_URL:https://apis.data.go.kr/B551011/KorService2}
    service-key: ${TOUR_API_KEY:}
    mobile-os: ${TOUR_API_MOBILE_OS:ETC}
    mobile-app: ${TOUR_API_MOBILE_APP:tour-server}
    connect-timeout: 3s
    read-timeout: 10s
  odsay:
    enabled: ${ODSAY_ENABLED:false}
    base-url: ${ODSAY_BASE_URL:https://api.odsay.com}
    api-key: ${ODSAY_API_KEY:}
    connect-timeout: 3s
    read-timeout: 10s
    min-request-interval: ${ODSAY_MIN_REQUEST_INTERVAL:150ms}
    cache:
      path-ttl: ${ODSAY_ROUTE_CACHE_TTL:30m}
      detail-ttl: ${ODSAY_ROUTE_DETAIL_CACHE_TTL:5m}
      max-entries: ${ODSAY_ROUTE_CACHE_MAX_ENTRIES:2048}
  busan-bims:
    enabled: ${BUSAN_BIMS_ENABLED:false}
    base-url: ${BUSAN_BIMS_BASE_URL:https://apis.data.go.kr/6260000/BusanBIMS}
    service-key: ${BUSAN_BIMS_API_KEY:}
    connect-timeout: 3s
    read-timeout: 5s
  tmap:
    base-url: ${TMAP_BASE_URL:https://apis.openapi.sk.com}
    app-key: ${SKT_API_KEY:}
    connect-timeout: 3s
    read-timeout: 5s
    walking:
      enabled: ${TMAP_WALKING_ENABLED:false}

app:
  schedule-planner:
    actual-route-rerank-enabled: ${SCHEDULE_ACTUAL_ROUTE_RERANK_ENABLED:true}
    actual-route-rerank-candidates: ${SCHEDULE_ACTUAL_ROUTE_RERANK_CANDIDATES:3}
    multi-day-actual-rerank-candidates: ${SCHEDULE_MULTI_DAY_ACTUAL_RERANK_CANDIDATES:3}
    max-route-estimate-provider-calls: ${SCHEDULE_MAX_ROUTE_ESTIMATE_PROVIDER_CALLS:30}
  ai-planner:
    enabled: ${AI_PLANNER_ENABLED:false}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com}
    api-key: ${OPENAI_API_KEY:}
    model: ${AI_PLANNER_MODEL:gpt-5.6-luna}
    connect-timeout: 3s
    read-timeout: 8s
  place-ingestion:
    tour-api:
      enabled: ${TOUR_API_PLACE_INGESTION_ENABLED:false}
      area-code: ${TOUR_API_AREA_CODE:6}
      content-type-ids: ${TOUR_API_CONTENT_TYPE_IDS:12,14,15,28,32,38,39}
      page-size: ${TOUR_API_PAGE_SIZE:100}
      max-pages: ${TOUR_API_MAX_PAGES:1}
      max-requests-per-day: ${TOUR_API_MAX_REQUESTS_PER_DAY:900}
      scheduler:
        enabled: ${TOUR_API_INGESTION_SCHEDULER_ENABLED:false}
        cron: "${TOUR_API_INGESTION_CRON:0 0 4 * * *}"
