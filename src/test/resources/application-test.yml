spring:
  datasource:
    url: jdbc:h2:mem:tour-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

external:
  odsay:
    enabled: false
  busan-bims:
    enabled: false
  tmap:
    walking:
      enabled: false

app:
  place-ingestion:
    tour-api:
      enabled: false
      scheduler:
        enabled: false
