# 개발 서버 자동 배포 Workflow
# 목적:
# - main 브랜치에 merge된 코드를 기준으로 Docker 이미지를 빌드한다.
# - Docker Hub에 이미지를 push한다.
# - 개발 VM에 SSH로 접속해서 기존 컨테이너를 새 이미지로 교체한다.

name: Deploy Dev Server

# PR 생성/수정 때는 실행되지 않는다.
# PR이 main에 merge되어 main 브랜치에 push가 발생할 때만 자동 배포된다.
on:
  push:
    branches:
      - main

# 같은 개발 서버 배포가 동시에 여러 개 실행되면 컨테이너 교체가 꼬일 수 있다.
# 그래서 이전 실행 중인 배포는 취소하고 최신 배포만 진행한다.
concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy to Dev VM
    runs-on: ubuntu-latest

    steps:
      # 현재 server 레포 코드를 GitHub Actions runner로 내려받는다.
      # Dockerfile, src, Gradle 파일을 사용해서 이미지를 빌드하기 위해 필요하다.
      - name: Checkout repository
        uses: actions/checkout@v6

      # Docker Buildx는 Docker 이미지를 빌드하는 확장 빌더다.
      # 캐시, BuildKit, 멀티 플랫폼 빌드 같은 기능을 사용할 수 있다.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Docker Hub 로그인
      # Docker Hub 비밀번호가 아니라 Access Token을 GitHub Secrets에 저장해서 사용한다.
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Docker 이미지 빌드 후 Docker Hub에 push한다.
      # latest-dev: 개발 서버가 항상 최신 개발 이미지를 pull할 때 사용한다.
      # github.sha: 특정 커밋 버전으로 되돌릴 때 사용할 수 있는 고유 태그다.
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}:latest-dev
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 개발 VM에 SSH로 접속해서 Docker 컨테이너를 교체한다.
      # 외부 Action 대신 ssh 명령어를 직접 사용해서 구조를 단순하게 유지한다.
      - name: Deploy to Dev VM
        env:
          DEV_HOST: ${{ secrets.DEV_HOST }}
          DEV_SSH_USER: ${{ secrets.DEV_SSH_USER }}
          DEV_SSH_KEY: ${{ secrets.DEV_SSH_KEY }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_IMAGE_NAME: ${{ secrets.DOCKER_IMAGE_NAME }}
        run: |
          # SSH private key를 GitHub Actions runner 안에 임시 파일로 저장한다.
          mkdir -p ~/.ssh
          echo "$DEV_SSH_KEY" > ~/.ssh/dev_key
          chmod 600 ~/.ssh/dev_key

          # 최초 SSH 접속 시 "Are you sure you want to continue connecting?" 질문이 뜨지 않게 한다.
          ssh-keyscan -H "$DEV_HOST" >> ~/.ssh/known_hosts

          # 개발 VM에서 실제 배포 명령을 실행한다.
          ssh -i ~/.ssh/dev_key "$DEV_SSH_USER@$DEV_HOST" << EOF
            set -e

            echo "Pull latest dev image"
            sudo docker pull ${DOCKERHUB_USERNAME}/${DOCKER_IMAGE_NAME}:latest-dev
  
            sudo docker stop server-dev || true
            
            sudo docker rm server-dev || true
            
            sudo docker run -d \
            --name server-dev \
            --restart unless-stopped \
            -p 127.0.0.1:8080:8080 \
            -e SPRING_PROFILES_ACTIVE=dev \
            -e TZ=Asia/Seoul \
            ${DOCKERHUB_USERNAME}/${DOCKER_IMAGE_NAME}:latest-dev
            
            sudo docker image prune -f
            
            sudo docker ps
          EOF