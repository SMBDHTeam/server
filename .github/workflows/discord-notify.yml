# - PR 생성, PR merge, main push 시 Discord 알링ㄻ

name: Discord Notify

on:
  # main 브랜치에 push될 때 알림
  # 보통 PR merge 후 main에 반영되면 이벤트 발생
  push:
    branches:
      - main

  # PR 생성, 다시 열림, 닫힘 이벤트 감지
  pull_request:
    types:
      - opened
      - reopened
      - closed

  # GitHub Actions 화면에서 수동 테스트할 수 있게 함
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  notify:
    name: Send Discord Notification
    runs-on: ubuntu-latest

    steps:
      # Discord Webhook Secret이 등록되어 있는지 확인한다.
      - name: Check Discord webhook secret
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL secret is missing."
            exit 1
          fi

      # 수동 테스트 알림
      - name: Notify manual test
        if: github.event_name == 'workflow_dispatch'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
        run: |
          MESSAGE="🧪 **Discord 알림 테스트**
          Repository: ${REPOSITORY}
          Actor: ${ACTOR}
          Status: Webhook 연결 테스트 성공"

          jq -n --arg content "$MESSAGE" '{content: $content}' \
            | curl -sS -H "Content-Type: application/json" \
                -d @- "$DISCORD_WEBHOOK_URL"

      # main push 알림
      - name: Notify main push
        if: github.event_name == 'push'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPOSITORY: ${{ github.repository }}
          BRANCH_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
        run: |
          MESSAGE="🚀 **main 브랜치 push 발생**
          Repository: ${REPOSITORY}
          Branch: ${BRANCH_NAME}
          Actor: ${ACTOR}
          Commit: ${COMMIT_MESSAGE}
          URL: ${COMMIT_URL}"

          jq -n --arg content "$MESSAGE" '{content: $content}' \
            | curl -sS -H "Content-Type: application/json" \
                -d @- "$DISCORD_WEBHOOK_URL"

      # PR 생성 / 다시 열림 알림
      - name: Notify pull request opened
        if: github.event_name == 'pull_request' && github.event.action != 'closed'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          ACTION_NAME: ${{ github.event.action }}
        run: |
          MESSAGE="🟡 **Pull Request ${ACTION_NAME}**
          Repository: ${REPOSITORY}
          From: ${HEAD_BRANCH}
          To: ${BASE_BRANCH}
          Actor: ${ACTOR}
          Title: ${PR_TITLE}
          URL: ${PR_URL}"

          jq -n --arg content "$MESSAGE" '{content: $content}' \
            | curl -sS -H "Content-Type: application/json" \
                -d @- "$DISCORD_WEBHOOK_URL"

      # PR merge 알림
      - name: Notify pull request merged
        if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
        run: |
          MESSAGE="✅ **Pull Request Merge 완료**
          Repository: ${REPOSITORY}
          From: ${HEAD_BRANCH}
          To: ${BASE_BRANCH}
          Merged by: ${ACTOR}
          Title: ${PR_TITLE}
          URL: ${PR_URL}"

          jq -n --arg content "$MESSAGE" '{content: $content}' \
            | curl -sS -H "Content-Type: application/json" \
                -d @- "$DISCORD_WEBHOOK_URL"