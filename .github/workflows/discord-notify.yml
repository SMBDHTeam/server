name: Discord Notify

on:

  pull_request:
    types:
      - closed


  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  notify:
    name: Send Discord Notification
    runs-on: ubuntu-latest

    steps:
      # Discord Webhook Secret 등록 여부 확인
      - name: Check Discord webhook secret
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL secret is missing."
            exit 1
          fi

      # 수동 테스트 알림
      - name: Notify manual test
        if: github.event_name == 'workflow_dispatch'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
        run: |
          MESSAGE="🧪 **Discord 알림 테스트**

          📦 저장소 : ${REPOSITORY}
          👤 실행자 : ${ACTOR}

          ✅ Webhook 연결 테스트 성공"

          jq -n --arg content "$MESSAGE" '{content: $content}' \
            | curl --fail-with-body -sS \
                -H "Content-Type: application/json" \
                -d @- "$DISCORD_WEBHOOK_URL"

      # PR merge 완료 알림
      - name: Notify pull request merged
        if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ACTOR: ${{ github.actor }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          MERGE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${MERGE_COMMIT_SHA}"

          MESSAGE="✅ **PR Merge 완료**

          🌿 브랜치 : ${HEAD_BRANCH} → ${BASE_BRANCH}
          👤 작성자 : ${ACTOR}
          📝 제목 : ${PR_TITLE}

          🔗 PR 링크 : <${PR_URL}>
          
          🔗 커밋 링크 : <${COMMIT_URL}>"

          jq -n --arg content "$MESSAGE" '{content: $content}' \
            | curl --fail-with-body -sS \
                -H "Content-Type: application/json" \
                -d @- "$DISCORD_WEBHOOK_URL"