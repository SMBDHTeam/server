server {
    listen 80;

    # 아직 도메인이 없으므로 모든 Host 요청으로 받을거임
    # 나중에 도메인 연결시 수정
    # 아 시발 키 관리 잘해야겠다 존나 귀찮다
    # fucking aws im gonna migration to gcp  fucking AWS ㅗ
    # idk branch rule
    # so im do as i plz
    server_name _;

    location / {
        # Spring Boot Docker 컨테이너는 EC2 내부에서만 8080으로  열림
        proxy_pass http://127.0.0.1:8080;

        # 원본 요청 정보를 Spring Boot에 전달
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # 프록시를 거친 실제 클라이언트 IP 정보를 전달
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 원래 요청 프로토콜(http/https)을 전달
        proxy_set_header X-Forwarded-Proto $scheme;

        # HTTP/1.1 사용
        proxy_http_version 1.1;
    }
}